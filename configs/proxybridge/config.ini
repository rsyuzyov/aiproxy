# ProxyBridge — конфигурация (формат совместим с ProxyBridgeGUI)
#
# [SETTINGS] — настройки прокси-сервера
#   ip    — IP-адрес прокси
#   port  — порт прокси
#   type  — 0=HTTP, 1=SOCKS5
#   user  — имя пользователя (пусто, если без авторизации)
#   pass  — пароль (пусто, если без авторизации)
#   logging — 0=выкл, 1=вкл
#   dns   — DNS через прокси: 0=нет, 1=да
#
# [RULES] — правила маршрутизации
#   Формат строки: id|protocol|action|enabled|process|hosts|ports
#   protocol: 0=TCP, 1=UDP, 2=BOTH
#   action:   0=PROXY, 1=DIRECT, 2=BLOCK
#   enabled:  0=выкл, 1=вкл
#
# По умолчанию: весь трафик напрямую (DIRECT).
# Настройки можно менять через ProxyBridgeGUI или вручную.

[SETTINGS]
ip=127.0.0.1
port=1080
type=1
user=
pass=
logging=0
dns=1

[RULES]
1|2|1|1|*|*|*
